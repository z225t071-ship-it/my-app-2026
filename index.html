<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お役所書類のバカよけ翻訳機</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="container">
            <h1>📄 お役所書類のバカよけ翻訳機</h1>
            <p>難しい言葉を、誰にでもわかる言葉に。</p>
        </div>
    </header>

    <main class="container">
        <section class="translator-section">
            <div class="input-group">
                <label for="input-text">入力 / 输入 / 입력 / Input</label>
                <textarea id="input-text" placeholder="ここに文章を入力してください...&#10;请输入... / 여기에 입력... / Input here..."></textarea>
                <div class="button-row">
                    <button id="sample-btn" class="btn-secondary">ランダムサンプル / Sample</button>
                    <button id="clear-btn" class="btn-outline">クリア / Clear</button>
                </div>
            </div>

            <div class="divider">
                <div class="arrow">↓</div>
            </div>

            <div class="output-group">
                <label for="output-text">変換結果 / 结果 / 결과 / Result</label>
                <div id="output-text" class="output-display" aria-live="polite">
                    <span class="placeholder">変換結果がここに表示されます</span>
                </div>
                <button id="copy-btn" class="btn-secondary" disabled>コピー / Copy</button>
            </div>
        </section>

        <section class="info-section">
            <h2>このアプリについて</h2>
            <p>お役所の書類特有の「難しくて分かりにくい表現」を、日常的な分かりやすい言葉に変換します。心理的なハードルを下げ、手続きをスムーズに進めるための補助ツールです。</p>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 お役所書類のバカよけ翻訳機</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
