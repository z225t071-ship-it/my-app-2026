<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GANYAKU - 行政文書クラッシャー</title>
    <style>
        /* 設計標記與全域變數 */
        :root {
            --bg-color: #000000;
            --panel-bg: #0d0d0d;
            --text-color: #ffffff;
            --text-muted: #666666;
            --danger-color: #ff0055;
            --safe-color: #00ff00;
            --warning-color: #ffcc00;
            --accent-blue: #0078D4;
            --filter-color: rgba(255, 255, 255, 0.3); /* 動態變更 */
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 手機外殼容器 */
        .phone-container {
            width: 100%;
            max-width: 390px;
            height: 844px;
            background-color: var(--panel-bg);
            border: 8px solid #1a1a1a;
            border-radius: 40px;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* 頂部導航列 */
        .app-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px 10px 24px;
            z-index: 10;
        }

        .brand-logo {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        /* 語言切換選單 */
        .lang-selector {
            display: flex;
            background: #1e1e1e;
            padding: 2px;
            border-radius: 8px;
            gap: 2px;
        }

        .lang-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: bold;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.1s;
        }

        .lang-btn.active {
            background: #ffffff;
            color: #000000;
        }

        /* 畫面通用結構 */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 70px 24px 24px 24px; /* 避開頂部 app-bar */
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease-in-out;
            background-color: var(--panel-bg);
        }

        .screen.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* --- 畫面 1：極簡相機與文件預選器 --- */
        .camera-container {
            flex: 1.1;
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            background: #050505;
            border: 1px solid #222;
        }

        #webcam {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        /* 擬真對焦邊框 */
        .scan-frame {
            position: absolute;
            top: 15%;
            left: 10%;
            width: 80%;
            height: 70%;
            border: 1px solid rgba(255, 255, 255, 0.15);
            pointer-events: none;
            z-index: 5;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.6);
        }

        /* 四個邊角白色指示線 */
        .scan-frame::before, .scan-frame::after,
        .scan-corner-bl, .scan-corner-br {
            position: absolute;
            width: 16px;
            height: 16px;
            border-color: #ffffff;
            border-style: solid;
            pointer-events: none;
        }
        .scan-frame::before { top: -1px; left: -1px; border-width: 3px 0 0 3px; }
        .scan-frame::after { top: -1px; right: -1px; border-width: 3px 3px 0 0; }
        .scan-corner-bl { bottom: -1px; left: -1px; border-width: 0 0 3px 3px; }
        .scan-corner-br { bottom: -1px; right: -1px; border-width: 0 3px 3px 0; }

        .camera-placeholder {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 1;
            width: 80%;
        }

        .scan-icon {
            font-size: 2.5rem;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .scan-prompt {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-muted);
            line-height: 1.4;
        }

        /* 閃光燈特效層 */
        .flash-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            opacity: 0;
            z-index: 10;
            pointer-events: none;
        }

        /* 書類類型預選標題 */
        .selector-title {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 15px 0 8px 0;
            font-weight: 800;
        }

        /* 預選卡片網格 */
        .doc-selector-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            margin-bottom: 15px;
        }

        .selector-card {
            background: #111111;
            border: 1px solid #222222;
            padding: 12px 10px;
            border-radius: 12px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .selector-card.active {
            background: #ffffff;
            border-color: #ffffff;
        }

        .selector-card .card-emoji {
            font-size: 1.2rem;
            margin-bottom: 4px;
        }

        .selector-card .card-name {
            font-size: 0.85rem;
            font-weight: 800;
            color: #ffffff;
        }

        .selector-card.active .card-name {
            color: #000000;
        }

        .selector-card .card-meta {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .selector-card.active .card-meta {
            color: #555555;
        }

        /* 動作大按鈕 */
        .shutter-btn {
            width: 100%;
            background: var(--danger-color);
            color: #ffffff;
            border: none;
            padding: 18px;
            font-size: 1.1rem;
            font-weight: 800;
            border-radius: 16px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.1s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 12px rgba(255, 0, 85, 0.2);
        }

        .shutter-btn:active {
            transform: scale(0.98);
            filter: brightness(0.9);
        }

        /* --- 畫面 2：解析中 --- */
        .loading-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            background: #000000;
            border-radius: 24px;
            overflow: hidden;
        }

        #scan-back-preview {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.4;
            filter: blur(2px);
            transition: filter 0.3s;
        }

        /* 智慧光譜色調過濾層 */
        .spectral-filter {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            mix-blend-mode: color;
            pointer-events: none;
            z-index: 1;
            background-color: transparent;
            transition: background-color 0.3s;
        }

        /* 擬真浮水印辨識標籤 */
        .hologram-watermark {
            position: absolute;
            font-size: 3.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.15);
            border: 5px solid rgba(255, 255, 255, 0.15);
            padding: 10px 20px;
            transform: rotate(-25deg);
            pointer-events: none;
            z-index: 2;
            text-align: center;
            line-height: 1;
            transition: all 0.3s;
        }

        .laser-line {
            position: absolute;
            width: 100%;
            height: 4px;
            background: #ffffff;
            box-shadow: 0 0 15px #ffffff;
            top: 0;
            z-index: 3;
            animation: scanMove 1.5s infinite ease-in-out;
        }

        @keyframes scanMove {
            0% { top: 5%; }
            50% { top: 95%; }
            100% { top: 5%; }
        }

        .loading-text {
            font-size: 1.5rem;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 2px;
            z-index: 4;
            text-transform: uppercase;
            text-align: center;
            padding: 0 20px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        .loading-subtext {
            font-size: 0.8rem;
            color: var(--text-color);
            z-index: 4;
            margin-top: 10px;
            text-align: center;
            font-weight: bold;
            text-shadow: 0 1px 5px rgba(0,0,0,0.8);
        }

        /* --- 畫面 3：解析結果面板 --- */
        .result-scroll {
            flex: 1;
            overflow-y: auto;
            padding-right: 2px;
        }
        .result-scroll::-webkit-scrollbar { width: 0; }

        /* 核心摘要看板 */
        .conclusion-card {
            background: #111111;
            border: 1px solid #222222;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
            position: relative;
        }

        .status-pill {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 0.7rem;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .pill-red { background: rgba(255, 0, 85, 0.15); color: var(--danger-color); border: 1px solid var(--danger-color); }
        .pill-yellow { background: rgba(255, 204, 0, 0.15); color: var(--warning-color); border: 1px solid var(--warning-color); }
        .pill-green { background: rgba(0, 255, 0, 0.15); color: var(--safe-color); border: 1px solid var(--safe-color); }

        .result-item {
            margin-bottom: 16px;
        }
        .result-item:last-child { margin-bottom: 0; }

        .item-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 4px;
            display: block;
            font-weight: bold;
        }

        .item-value {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .item-value.huge {
            font-size: 2.5rem;
            color: #ffffff;
            line-height: 1;
            font-weight: 900;
        }

        /* 無腦指令卡片 */
        .section-title {
            font-size: 1rem;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 16px;
            letter-spacing: 1px;
        }

        .step-tile {
            background: #111111;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }

        .step-index {
            font-size: 0.9rem;
            font-weight: 900;
            color: var(--text-muted);
            background: #1e1e1e;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
        }

        .step-info { flex: 1; }
        .step-heading { font-size: 1.05rem; font-weight: 800; color: #ffffff; margin: 0 0 4px 0; }
        .step-detail { font-size: 0.85rem; color: var(--text-muted); margin: 0; line-height: 1.4; }

        .done-btn {
            width: 100%;
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 18px;
            font-size: 1.1rem;
            font-weight: 800;
            border-radius: 16px;
            margin-top: 16px;
            cursor: pointer;
            text-transform: uppercase;
        }
        .done-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="phone-container">
        <!-- 頂部：標誌與語言切換區 -->
        <div class="app-bar">
            <div class="brand-logo">GANYAKU</div>
            <div class="lang-selector">
                <button class="lang-btn active" id="btn-jp" onclick="changeLanguage('jp')">JP</button>
                <button class="lang-btn" id="btn-cn" onclick="changeLanguage('cn')">CN</button>
                <button class="lang-btn" id="btn-en" onclick="changeLanguage('en')">EN</button>
                <button class="lang-btn" id="btn-kr" onclick="changeLanguage('kr')">KR</button>
            </div>
        </div>

        <!-- SCREEN 1：相機畫面與預選器 -->
        <div class="screen active" id="screen-start">
            <div class="camera-container">
                <div class="camera-placeholder" id="cam-placeholder">
                    <div class="scan-icon">🔲</div>
                    <div class="scan-prompt" id="prompt-loading">CAMERA INITIALIZING...</div>
                </div>
                <!-- 手機相機畫面流 -->
                <video id="webcam" autoplay playsinline></video>
                
                <div class="scan-frame" id="scan-guide" style="display:none;">
                    <div class="scan-corner-bl"></div>
                    <div class="scan-corner-br"></div>
                </div>

                <!-- 快門閃光層 -->
                <div class="flash-overlay" id="flash"></div>
            </div>

            <!-- 高級書類類型預選器 -->
            <div class="selector-title" id="lbl-select-type">書類の種類 (預選文件)</div>
            <div class="doc-selector-grid">
                <div class="selector-card active" id="card-juumin" onclick="selectDocType('juumin')">
                    <div class="card-emoji">📄</div>
                    <div class="card-name" id="name-juumin">住民税</div>
                    <div class="card-meta" id="meta-juumin">高額納税</div>
                </div>
                <div class="selector-card" id="card-nenkin" onclick="selectDocType('nenkin')">
                    <div class="card-emoji">🚨</div>
                    <div class="card-name" id="name-nenkin">国民年金</div>
                    <div class="card-meta" id="meta-nenkin">督促状</div>
                </div>
                <div class="selector-card" id="card-suido" onclick="selectDocType('suido')">
                    <div class="card-emoji">💧</div>
                    <div class="card-name" id="name-suido">水道料金</div>
                    <div class="card-meta" id="meta-suido">日常支払</div>
                </div>
                <div class="selector-card" id="card-hoken" onclick="selectDocType('hoken')">
                    <div class="card-emoji">🏥</div>
                    <div class="card-name" id="name-hoken">健康保険</div>
                    <div class="card-meta" id="meta-hoken">加入通知</div>
                </div>
            </div>

            <button class="shutter-btn" id="btn-shutter" onclick="takeSnapshot()">SCAN DOCUMENT</button>
        </div>

        <!-- SCREEN 2：高科技擬真掃描中 -->
        <div class="screen" id="screen-loading">
            <div class="loading-container">
                <!-- 智慧抓拍背景 -->
                <img id="scan-back-preview" src="" alt="Capture">
                <!-- 光譜過濾色調層 -->
                <div class="spectral-filter" id="color-filter"></div>
                <!-- 智能光學標籤浮水印 -->
                <div class="hologram-watermark" id="holo-tag">TAG</div>
                
                <div class="laser-line" id="scanner-laser"></div>
                <div class="loading-text" id="lbl-analyzing">ANALYZING...</div>
                <div class="loading-subtext" id="lbl-progress">Extracting key data...</div>
            </div>
        </div>

        <!-- SCREEN 3：智慧解析結論頁 -->
        <div class="screen" id="screen-result">
            <div class="result-scroll">
                <div class="conclusion-card">
                    <div class="status-pill pill-yellow" id="res-status">-</div>
                    
                    <div class="result-item">
                        <span class="item-label" id="lbl-res-type">DOCUMENT TYPE</span>
                        <span class="item-value" id="res-type">-</span>
                    </div>
                    <div class="result-item">
                        <span class="item-label" id="lbl-res-money">PAYMENT AMOUNT</span>
                        <span class="item-value huge" id="res-money">-</span>
                    </div>
                    <div class="result-item">
                        <span class="item-label" id="lbl-res-deadline">DEADLINE</span>
                        <span class="item-value" id="res-deadline">-</span>
                    </div>
                </div>

                <div class="section-title" id="lbl-actions">REQUIRED ACTIONS</div>

                <div class="step-tile">
                    <div class="step-index">1</div>
                    <div class="step-info">
                        <h4 class="step-heading" id="step1-title">-</h4>
                        <p class="step-detail" id="step1-desc">-</p>
                    </div>
                </div>

                <div class="step-tile">
                    <div class="step-index">2</div>
                    <div class="step-info">
                        <h4 class="step-heading" id="step2-title">-</h4>
                        <p class="step-detail" id="step2-desc">-</p>
                    </div>
                </div>

                <div class="step-tile">
                    <div class="step-index">3</div>
                    <div class="step-info">
                        <h4 class="step-heading" id="step3-title">-</h4>
                        <p class="step-detail" id="step3-desc">-</p>
                    </div>
                </div>
            </div>

            <button class="done-btn" id="btn-done" onclick="resetApp()">OK</button>
        </div>
    </div>

    <!-- 用於緩存拍照截圖的隱藏畫布 -->
    <canvas id="capture-canvas" style="display:none;"></canvas>

        // 四種書類的光學光譜分析色調配置（與各自種類完美符合）
        const spectralSettings = {
            juumin: {
                color: "rgba(0, 255, 0, 0.3)", // 綠色科技光譜
                laser: "rgba(0, 255, 0, 1)",
                shadow: "0 0 15px #00ff00"
            },
            nenkin: {
                color: "rgba(255, 0, 85, 0.3)", // 紅色警報光譜
                laser: "rgba(255, 0, 85, 1)",
                shadow: "0 0 15px #ff0055"
            },
            suido: {
                color: "rgba(0, 120, 212, 0.3)", // 藍色水利光譜
                laser: "rgba(0, 120, 212, 1)",
                shadow: "0 0 15px #0078D4"
            },
            hoken: {
                color: "rgba(255, 204, 0, 0.3)", // 黃色射線光譜
                laser: "rgba(255, 204, 0, 1)",
                shadow: "0 0 15px #ffcc00"
            }
        };

        let currentLang = 'jp';
        let selectedDocType = 'juumin'; // 預設公文類型
        let videoStream = null;

        window.addEventListener('DOMContentLoaded', () => {
            initCamera();
            updateUIStrings();
        });

        // 啟動相機
        async function initCamera() {
            try {
                videoStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' },
                    audio: false
                });
                const video = document.getElementById('webcam');
                video.srcObject = videoStream;
                video.style.display = 'block';
                document.getElementById('cam-placeholder').style.display = 'none';
                document.getElementById('scan-guide').style.display = 'block';
            } catch (err) {
                console.error("相機啟動失敗:", err);
                const errText = {
                    jp: "カメラが見つかりません。下の書類タイプを選んでスキャンを押してください。",
                    cn: "未偵測到相機。請直接在下方選擇公文類型，並點選掃描按鈕。",
                    en: "Camera not found. Please choose a document type below and click SCAN.",
                    kr: "카메라를 찾을 수 없습니다. 고지서 종류를 선택하고 스캔을 눌러주세요."
                };
                document.getElementById('cam-placeholder').innerHTML = 
                    `<div class="scan-icon">⚠️</div><div class="scan-prompt" style="font-size:0.85rem;">${errText[currentLang]}</div>`;
            }
        }

        // 文件選擇與切換
        function selectDocType(docType) {
            selectedDocType = docType;
            document.querySelectorAll('.selector-card').forEach(card => card.classList.remove('active'));
            document.getElementById('card-' + docType).classList.add('active');
        }

        // 切換系統語言環境
        function changeLanguage(langCode) {
            currentLang = langCode;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + langCode).classList.add('active');
            
            updateUIStrings();
            if (document.getElementById('screen-result').classList.contains('active')) {
                renderResult(selectedDocType);
            }
        }

        // 更新介面各欄位文字
        function updateUIStrings() {
            const trans = translations[currentLang];
            const prompt = document.getElementById('prompt-loading');
            if (prompt && videoStream === null) {
                prompt.innerHTML = trans.promptLoading;
            }
            
            document.getElementById('lbl-select-type').innerText = trans.lblSelectType;
            document.getElementById('btn-shutter').innerText = trans.btnShutter.toUpperCase();
            document.getElementById('lbl-analyzing').innerText = trans.lblAnalyzing.toUpperCase();
            document.getElementById('lbl-res-type').innerText = trans.lblResType;
            document.getElementById('lbl-res-money').innerText = trans.lblResMoney;
            document.getElementById('lbl-res-deadline').innerText = trans.lblResDeadline;
            document.getElementById('lbl-actions').innerText = trans.lblActions;
            document.getElementById('btn-done').innerText = trans.btnDone.toUpperCase();

            // 更新預選卡片
            document.getElementById('name-juumin').innerText = trans.docNames.juumin;
            document.getElementById('meta-juumin').innerText = trans.docMetas.juumin;

            document.getElementById('name-nenkin').innerText = trans.docNames.nenkin;
            document.getElementById('meta-nenkin').innerText = trans.docMetas.nenkin;

            document.getElementById('name-suido').innerText = trans.docNames.suido;
            document.getElementById('meta-suido').innerText = trans.docMetas.suido;

            document.getElementById('name-hoken').innerText = trans.docNames.hoken;
            document.getElementById('meta-hoken').innerText = trans.docMetas.hoken;
        }

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // 拍照擷取與動態光譜特效渲染
        function takeSnapshot() {
            const video = document.getElementById('webcam');
            const canvas = document.getElementById('capture-canvas');
            const ctx = canvas.getContext('2d');
            const flash = document.getElementById('flash');

            // 1. 閃光燈效果
            flash.style.opacity = '1';
            setTimeout(() => {
                flash.style.opacity = '0';
                flash.style.transition = 'opacity 0.2s ease-out';
            }, 50);

            // 2. 影像截圖與背景配置
            if (videoStream && video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                const dataUrl = canvas.toDataURL('image/jpeg');
                const previewImg = document.getElementById('scan-back-preview');
                previewImg.style.display = 'block';
                previewImg.src = dataUrl;
            } else {
                document.getElementById('scan-back-preview').style.display = 'none';
            }

            // 3. 配置符合當前選擇文件的「專屬光譜濾鏡」與「智慧水印標籤」
            const spectral = spectralSettings[selectedDocType];
            const trans = translations[currentLang];
            
            // 變更過濾器色調
            document.getElementById('color-filter').style.backgroundColor = spectral.color;
            // 變更雷射線色彩與陰影
            const laser = document.getElementById('scanner-laser');
            laser.style.backgroundColor = spectral.laser;
            laser.style.boxShadow = spectral.shadow;
            
            // 更新浮水印內容
            const holoTag = document.getElementById('holo-tag');
            holoTag.innerText = trans.holoTags[selectedDocType].toUpperCase();
            holoTag.style.color = spectral.laser.replace('1)', '0.25)'); // 微調半透明
            holoTag.style.borderColor = spectral.laser.replace('1)', '0.25)');

            // 4. 進入雷射解析動畫畫面
            switchScreen('screen-loading');
            document.getElementById('lbl-progress').innerText = trans.ocrProgress;

            setTimeout(() => {
                renderResult(selectedDocType);
                switchScreen('screen-result');
            }, 1800);
        }

        // 渲染對應之多語系解析數據
        function renderResult(docKey) {
            const trans = translations[currentLang];
            const data = trans.data[docKey];
            const badge = document.getElementById('res-status');
            
            if (docKey === 'juumin') {
                badge.innerText = trans.statusHigh;
                badge.className = 'status-pill pill-yellow';
            } else if (docKey === 'nenkin') {
                badge.innerText = trans.statusUrgent;
                badge.className = 'status-pill pill-red';
            } else if (docKey === 'hoken') {
                badge.innerText = trans.statusHigh;
                badge.className = 'status-pill pill-yellow';
            } else {
                badge.innerText = trans.statusNormal;
                badge.className = 'status-pill pill-green';
            }

            // 本文渲染
            document.getElementById('res-type').innerText = data.type;
            document.getElementById('res-money').innerText = data.money;
            document.getElementById('res-deadline').innerText = data.deadline;

            document.getElementById('step1-title').innerText = data.steps[0].t;
            document.getElementById('step1-desc').innerText = data.steps[0].d;
            document.getElementById('step2-title').innerText = data.steps[1].t;
            document.getElementById('step2-desc').innerText = data.steps[1].d;
            document.getElementById('step3-title').innerText = data.steps[2].t;
            document.getElementById('step3-desc').innerText = data.steps[2].d;
        }

        function resetApp() {
            switchScreen('screen-start');
        }
    </script>
