<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GANYAKU - 行政文書クラッシャー</title>
    <!-- 引入 Tesseract.js 用於真實 OCR 圖片文字識別 -->
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        :root {
            --bg-color: #000000;
            --panel-bg: #0d0d0d;
            --text-color: #ffffff;
            --text-muted: #666666;
            --danger-color: #ff0055;
            --safe-color: #00ff00;
            --warning-color: #ffcc00;
            --accent-blue: #0078D4;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 手機外框 */
        .phone-container {
            width: 100%;
            max-width: 390px;
            height: 844px;
            background-color: var(--panel-bg);
            border: 8px solid #1a1a1a;
            border-radius: 40px;
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        /* 頂部導航列 */
        .app-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px 10px 24px;
            z-index: 10;
        }

        .brand-logo {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        /* 語言切換器 */
        .lang-selector {
            display: flex;
            background: #1e1e1e;
            padding: 2px;
            border-radius: 8px;
            gap: 2px;
        }

        .lang-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 0.75rem;
            font-weight: bold;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.1s;
        }

        .lang-btn.active {
            background: #ffffff;
            color: #000000;
        }

        /* 畫面基底 */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 70px 24px 24px 24px; /* 避開頂部 app-bar */
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.25s ease-in-out;
            background-color: var(--panel-bg);
        }

        .screen.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* --- 畫面 1：極簡相機預覽 --- */
        .camera-container {
            flex: 1;
            position: relative;
            border-radius: 24px;
            overflow: hidden;
            background: #050505;
        }

        #webcam {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        /* 極簡掃描框 */
        .scan-frame {
            position: absolute;
            top: 15%;
            left: 10%;
            width: 80%;
            height: 70%;
            border: 1px solid rgba(255, 255, 255, 0.15);
            pointer-events: none;
            z-index: 5;
            box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.6);
        }

        /* 四個角極簡白色線條 */
        .scan-frame::before, .scan-frame::after,
        .scan-corner-bl, .scan-corner-br {
            position: absolute;
            width: 16px;
            height: 16px;
            border-color: #ffffff;
            border-style: solid;
            pointer-events: none;
        }
        .scan-frame::before { top: -1px; left: -1px; border-width: 3px 0 0 3px; }
        .scan-frame::after { top: -1px; right: -1px; border-width: 3px 3px 0 0; }
        .scan-corner-bl { bottom: -1px; left: -1px; border-width: 0 0 3px 3px; }
        .scan-corner-br { bottom: -1px; right: -1px; border-width: 0 3px 3px 0; }

        .camera-placeholder {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 1;
            width: 80%;
        }

        .scan-icon {
            font-size: 2.5rem;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .scan-prompt {
            font-size: 0.95rem;
            font-weight: 500;
            color: var(--text-muted);
            line-height: 1.4;
        }

        /* 閃光燈效果 */
        .flash-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            opacity: 0;
            z-index: 10;
            pointer-events: none;
        }

        /* 快門大按鈕 */
        .shutter-btn {
            width: 100%;
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 20px;
            font-size: 1.1rem;
            font-weight: 800;
            border-radius: 16px;
            margin-top: 16px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.1s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .shutter-btn:active {
            transform: scale(0.98);
            background-color: #e5e5e5;
        }

        /* 底部演示按鈕 */
        .demo-bar {
            margin-top: 16px;
            display: flex;
            gap: 8px;
        }

        .demo-btn {
            flex: 1;
            background: #111111;
            border: 1px solid #222222;
            color: var(--text-muted);
            padding: 12px 5px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 10px;
            transition: 0.1s;
        }
        .demo-btn:hover {
            border-color: #444444;
            color: #ffffff;
        }

        /* --- 畫面 2：極簡掃描中 --- */
        .loading-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            background: #000000;
            border-radius: 24px;
            overflow: hidden;
        }

        #scan-back-preview {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.3;
            filter: grayscale(1);
        }

        .laser-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: #ffffff;
            box-shadow: 0 0 12px #ffffff;
            top: 0;
            z-index: 2;
            animation: scanMove 1.5s infinite ease-in-out;
        }

        .loading-text {
            font-size: 1.5rem;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 2px;
            z-index: 3;
            text-transform: uppercase;
            text-align: center;
            padding: 0 20px;
        }

        .loading-subtext {
            font-size: 0.8rem;
            color: var(--text-muted);
            z-index: 3;
            margin-top: 10px;
            text-align: center;
        }

        /* --- 畫面 3：極簡結論畫面 --- */
        .result-scroll {
            flex: 1;
            overflow-y: auto;
            padding-right: 2px;
        }
        .result-scroll::-webkit-scrollbar { width: 0; }

        /* 核心結論看板 */
        .conclusion-card {
            background: #111111;
            border: 1px solid #222222;
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 24px;
            position: relative;
        }

        .status-pill {
            position: absolute;
            top: 20px;
            right: 20px;
            font-size: 0.7rem;
            font-weight: 800;
            padding: 4px 10px;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .pill-red { background: rgba(255, 0, 85, 0.15); color: var(--danger-color); border: 1px solid var(--danger-color); }
        .pill-yellow { background: rgba(255, 204, 0, 0.15); color: var(--warning-color); border: 1px solid var(--warning-color); }
        .pill-green { background: rgba(0, 255, 0, 0.15); color: var(--safe-color); border: 1px solid var(--safe-color); }

        .result-item {
            margin-bottom: 16px;
        }
        .result-item:last-child { margin-bottom: 0; }

        .item-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 4px;
            display: block;
            font-weight: bold;
        }

        .item-value {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .item-value.huge {
            font-size: 2.5rem;
            color: #ffffff;
            line-height: 1;
            font-weight: 900;
        }

        /* 步驟 */
        .section-title {
            font-size: 1rem;
            font-weight: 800;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 16px;
            letter-spacing: 1px;
        }

        .step-tile {
            background: #111111;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            gap: 16px;
            align-items: flex-start;
        }

        .step-index {
            font-size: 0.9rem;
            font-weight: 900;
            color: var(--text-muted);
            background: #1e1e1e;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
        }

        .step-info { flex: 1; }
        .step-heading { font-size: 1.05rem; font-weight: 800; color: #ffffff; margin: 0 0 4px 0; }
        .step-detail { font-size: 0.85rem; color: var(--text-muted); margin: 0; line-height: 1.4; }

        .done-btn {
            width: 100%;
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 18px;
            font-size: 1.1rem;
            font-weight: 800;
            border-radius: 16px;
            margin-top: 16px;
            cursor: pointer;
            text-transform: uppercase;
        }
        .done-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div class="phone-container">
        <!-- 頂部常駐：品牌 & 多國語言切換 -->
        <div class="app-bar">
            <div class="brand-logo">GANYAKU</div>
            <div class="lang-selector">
                <button class="lang-btn active" id="btn-jp" onclick="changeLanguage('jp')">JP</button>
                <button class="lang-btn" id="btn-cn" onclick="changeLanguage('cn')">CN</button>
                <button class="lang-btn" id="btn-en" onclick="changeLanguage('en')">EN</button>
                <button class="lang-btn" id="btn-kr" onclick="changeLanguage('kr')">KR</button>
            </div>
        </div>

        <!-- SCREEN 1：極簡相機 -->
        <div class="screen active" id="screen-start">
            <div class="camera-container">
                <div class="camera-placeholder" id="cam-placeholder">
                    <div class="scan-icon">🔲</div>
                    <div class="scan-prompt" id="prompt-loading">CAMERA INITIALIZING...</div>
                </div>
                <video id="webcam" autoplay playsinline></video>
                
                <div class="scan-frame" id="scan-guide" style="display:none;">
                    <div class="scan-corner-bl"></div>
                    <div class="scan-corner-br"></div>
                </div>

                <div class="flash-overlay" id="flash"></div>
            </div>

            <button class="shutter-btn" id="btn-shutter" onclick="takeSnapshot()">SCAN DOCUMENT</button>

            <div class="sample-selector-title" id="lbl-demo">DEMO SAMPLES</div>
            <div class="demo-bar">
                <button class="demo-btn" onclick="triggerDemo('juumin')">📄 税金 (TAX)</button>
                <button class="demo-btn" onclick="triggerDemo('nenkin')">🚨 年金 (PENSION)</button>
                <button class="demo-btn" onclick="triggerDemo('suido')">💧 水道 (WATER)</button>
            </div>
        </div>

        <!-- SCREEN 2：極簡掃描中 (具有 OCR 進度回饋) -->
        <div class="screen" id="screen-loading">
            <div class="loading-container">
                <img id="scan-back-preview" src="" alt="Capture">
                <div class="laser-line"></div>
                <div class="loading-text" id="lbl-analyzing">OCR READING...</div>
                <div class="loading-subtext" id="lbl-progress">Initializing engine...</div>
            </div>
        </div>

        <!-- SCREEN 3：結果畫面 -->
        <div class="screen" id="screen-result">
            <div class="result-scroll">
                <div class="conclusion-card">
                    <div class="status-pill pill-yellow" id="res-status">-</div>
                    
                    <div class="result-item">
                        <span class="item-label" id="lbl-res-type">DOCUMENT TYPE</span>
                        <span class="item-value" id="res-type">-</span>
                    </div>
                    <div class="result-item">
                        <span class="item-label" id="lbl-res-money">PAYMENT AMOUNT</span>
                        <span class="item-value huge" id="res-money">-</span>
                    </div>
                    <div class="result-item">
                        <span class="item-label" id="lbl-res-deadline">DEADLINE</span>
                        <span class="item-value" id="res-deadline">-</span>
                    </div>
                </div>

                <div class="section-title" id="lbl-actions">REQUIRED ACTIONS</div>

                <div class="step-tile">
                    <div class="step-index">1</div>
                    <div class="step-info">
                        <h4 class="step-heading" id="step1-title">-</h4>
                        <p class="step-detail" id="step1-desc">-</p>
                    </div>
                </div>

                <div class="step-tile">
                    <div class="step-index">2</div>
                    <div class="step-info">
                        <h4 class="step-heading" id="step2-title">-</h4>
                        <p class="step-detail" id="step2-desc">-</p>
                    </div>
                </div>

                <div class="step-tile">
                    <div class="step-index">3</div>
                    <div class="step-info">
                        <h4 class="step-heading" id="step3-title">-</h4>
                        <p class="step-detail" id="step3-desc">-</p>
                    </div>
                </div>
            </div>

            <button class="done-btn" id="btn-done" onclick="resetApp()">OK</button>
        </div>
    </div>

    <canvas id="capture-canvas" style="display:none;"></canvas>

        let currentLang = 'jp';
        let currentDocKey = 'juumin';
        let videoStream = null;

        window.addEventListener('DOMContentLoaded', () => {
            initCamera();
            updateUIStrings();
        });

        // 啟動鏡頭
        async function initCamera() {
            try {
                videoStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'environment' },
                    audio: false
                });
                const video = document.getElementById('webcam');
                video.srcObject = videoStream;
                video.style.display = 'block';
                document.getElementById('cam-placeholder').style.display = 'none';
                document.getElementById('scan-guide').style.display = 'block';
            } catch (err) {
                console.error("Camera error:", err);
                const errText = {
                    jp: "カメラが見つかりません。デモボタンを使用してください。",
                    cn: "未檢測到相機。請使用下方範例按鈕演示。",
                    en: "Camera not found. Please use the demo buttons below.",
                    kr: "카메라를 찾을 수 없습니다. 데모 버튼을 이용해 주세요."
                };
                document.getElementById('cam-placeholder').innerHTML = 
                    `<div class="scan-icon">⚠️</div><div class="scan-prompt" style="font-size:0.85rem;">${errText[currentLang]}</div>`;
            }
        }

        function changeLanguage(langCode) {
            currentLang = langCode;
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + langCode).classList.add('active');
            
            updateUIStrings();
            if (document.getElementById('screen-result').classList.contains('active')) {
                // 如果已經在結果畫面，就刷新語言
                if (currentDocKey === 'real_ocr_result' || currentDocKey === 'trash_ocr_result') {
                    renderRealOCRResult(lastRecognizedText);
                } else {
                    renderResult(currentDocKey);
                }
            }
        }

        function updateUIStrings() {
            const trans = translations[currentLang];
            const prompt = document.getElementById('prompt-loading');
            if (prompt) prompt.innerHTML = trans.promptLoading;
            
            document.getElementById('btn-shutter').innerText = trans.btnShutter.toUpperCase();
            document.getElementById('lbl-demo').innerText = trans.lblDemo.toUpperCase();
            document.getElementById('lbl-analyzing').innerText = trans.lblAnalyzing.toUpperCase();
            document.getElementById('lbl-res-type').innerText = trans.lblResType;
            document.getElementById('lbl-res-money').innerText = trans.lblResMoney;
            document.getElementById('lbl-res-deadline').innerText = trans.lblResDeadline;
            document.getElementById('lbl-actions').innerText = trans.lblActions;
            document.getElementById('btn-done').innerText = trans.btnDone.toUpperCase();
        }

        function switchScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // 拍照與真實智慧掃描
        let lastRecognizedText = "";

        function takeSnapshot() {
            const video = document.getElementById('webcam');
            const canvas = document.getElementById('capture-canvas');
            const ctx = canvas.getContext('2d');
            const flash = document.getElementById('flash');

            // 1. 閃光燈特效
            flash.style.opacity = '1';
            setTimeout(() => {
                flash.style.opacity = '0';
                flash.style.transition = 'opacity 0.2s ease-out';
            }, 50);

            // 2. 擷取圖片
            if (videoStream && video.readyState === video.HAVE_ENOUGH_DATA) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

                const dataUrl = canvas.toDataURL('image/jpeg');
                const previewImg = document.getElementById('scan-back-preview');
                previewImg.style.display = 'block';
                previewImg.src = dataUrl;

                // 3. 進入 OCR 分析階段
                switchScreen('screen-loading');
                document.getElementById('lbl-progress').innerText = translations[currentLang].ocrProgress;

                // 4. 調用 Tesseract.js 真實解析相機拍攝到的文字
                Tesseract.recognize(
                    dataUrl,
                    'jpn', // 使用日語字庫解析
                    { logger: m => {
                        if (m.status === 'recognizing text') {
                            const progress = Math.round(m.progress * 100);
                            document.getElementById('lbl-progress').innerText = `${translations[currentLang].ocrProgress} (${progress}%)`;
                        }
                    }}
                ).then(({ data: { text } }) => {
                    console.log("真實識別出的文字成果:", text);
                    lastRecognizedText = text;
                    processRecognizedText(text);
                }).catch(err => {
                    console.error("OCR Error:", err);
                    // 若失敗，使用備用智能兜底
                    processRecognizedText("");
                });

            } else {
                // 無鏡頭時防呆
                triggerDemo('juumin');
            }
        }

        // 智能解析文本
        function processRecognizedText(text) {
            // 尋找日文中的「金額」
            // 正則表達式：尋找帶有 ¥、円 的數字，或直接尋找3位以上數字
            const moneyRegex = /(?:[\u00A5¥]|円)\s*([0-9,，]{3,8})|([0-9,，]{3,8})\s*(円)/i;
            const moneyMatch = text.match(moneyRegex);

            // 尋找「期限」
            // 正則表達式：尋找 xx月xx日 或 202x年xx月xx日 或 xx/xx
            const dateRegex = /(\d{1,2})\s*月\s*(\d{1,2})\s*日|(\d{4})[./-](\d{1,2})[./-](\d{1,2})/;
            const dateMatch = text.match(dateRegex);

            let detectedMoney = "";
            let detectedDeadline = "";

            if (moneyMatch) {
                // 擷取配對到的純數字
                const rawNum = moneyMatch[1] || moneyMatch[2];
                detectedMoney = `¥${rawNum.trim()}`;
            }

            if (dateMatch) {
                if (dateMatch[1] && dateMatch[2]) {
                    detectedDeadline = `${dateMatch[1]}月${dateMatch[2]}日`;
                } else {
                    detectedDeadline = `${dateMatch[4]}月${dateMatch[5]}日`;
                }
            }

            // 如果有偵測到金額
            if (detectedMoney) {
                currentDocKey = 'real_ocr_result';
                renderRealOCRResult({
                    type: analyzeDocumentType(text),
                    money: detectedMoney,
                    deadline: detectedDeadline || "通知書を参照 (信上載明之期限)"
                });
            } else {
                // 如果完全沒有金額數字，代表可能是非通知/非繳費單（如宣傳單、信封封面、空白紙）
                currentDocKey = 'trash_ocr_result';
                renderTrashOCRResult();
            }
            
            switchScreen('screen-result');
        }

        // 依據字詞判定文件種類
        function analyzeDocumentType(text) {
            if (text.includes("住民") || text.includes("税")) return "住民税 (Tax)";
            if (text.includes("年金") || text.includes("保險")) return "国民年金 (Pension)";
            if (text.includes("水道") || text.includes("ガス") || text.includes("電気")) return "公共料金 (Utility Bill)";
            return "請求書 / 納付書";
        }

        // 渲染真實掃描結果
        function renderRealOCRResult(customData) {
            const trans = translations[currentLang];
            const badge = document.getElementById('res-status');
            
            badge.innerText = trans.statusHigh;
            badge.className = 'status-pill pill-yellow';

            document.getElementById('res-type').innerText = customData.type || trans.customScan.type;
            document.getElementById('res-money').innerText = customData.money;
            document.getElementById('res-deadline').innerText = customData.deadline;

            const steps = trans.customScan.steps;
            document.getElementById('step1-title').innerText = steps[0].t;
            document.getElementById('step1-desc').innerText = steps[0].d;
            document.getElementById('step2-title').innerText = steps[1].t;
            document.getElementById('step2-desc').innerText = steps[1].d;
            document.getElementById('step3-title').innerText = steps[2].t;
            document.getElementById('step3-desc').innerText = steps[2].d;
        }

        // 渲染「免繳費垃圾郵件」智能結果
        function renderTrashOCRResult() {
            const trans = translations[currentLang];
            const badge = document.getElementById('res-status');
            
            badge.innerText = trans.statusTrash;
            badge.className = 'status-pill pill-green';

            document.getElementById('res-type').innerText = trans.trashScan.type;
            document.getElementById('res-money').innerText = trans.trashScan.money;
            document.getElementById('res-deadline').innerText = trans.trashScan.deadline;

            const steps = trans.trashScan.steps;
            document.getElementById('step1-title').innerText = steps[0].t;
            document.getElementById('step1-desc').innerText = steps[0].d;
            document.getElementById('step2-title').innerText = steps[1].t;
            document.getElementById('step2-desc').innerText = steps[1].d;
            document.getElementById('step3-title').innerText = steps[2].t;
            document.getElementById('step3-desc').innerText = steps[2].d;
        }

        // 快速演示樣品按鈕
        function triggerDemo(docKey) {
            document.getElementById('scan-back-preview').style.display = 'none';
            currentDocKey = docKey;
            switchScreen('screen-loading');
            document.getElementById('lbl-progress').innerText = "Simulating analytics...";
            setTimeout(() => {
                renderResult(docKey);
                switchScreen('screen-result');
            }, 1000);
        }

        function renderResult(docKey) {
            const trans = translations[currentLang];
            const data = trans.data[docKey];
            const badge = document.getElementById('res-status');
            
            if (docKey === 'juumin') {
                badge.innerText = trans.statusHigh;
                badge.className = 'status-pill pill-yellow';
            } else if (docKey === 'nenkin') {
                badge.innerText = trans.statusUrgent;
                badge.className = 'status-pill pill-red';
            } else {
                badge.innerText = trans.statusNormal;
                badge.className = 'status-pill pill-green';
            }

            document.getElementById('res-type').innerText = data.type;
            document.getElementById('res-money').innerText = data.money;
            document.getElementById('res-deadline').innerText = data.deadline;

            document.getElementById('step1-title').innerText = data.steps[0].t;
            document.getElementById('step1-desc').innerText = data.steps[0].d;
            document.getElementById('step2-title').innerText = data.steps[1].t;
            document.getElementById('step2-desc').innerText = data.steps[1].d;
            document.getElementById('step3-title').innerText = data.steps[2].t;
            document.getElementById('step3-desc').innerText = data.steps[2].d;
        }

        function resetApp() {
            switchScreen('screen-start');
        }
